global:
  resolve_timeout: 5m
  # smtp_smarthost: "smtp.example.com:587"
  # smtp_from: "alertmanager@example.com"
  # smtp_auth_username: "alertmanager@example.com"
  # smtp_auth_password: "password"
  # smtp_require_tls: true

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "warning"
      repeat_interval: 4h

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://ai-analyzer:8000/api/explain-alert"
        send_resolved: true

  - name: "critical"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK"
        channel: "#alerts-critical"
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Alert:* {{ .CommonLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
        send_resolved: true
    # email_configs:
    #   - to: "oncall@example.com"
    #     send_resolved: true

  - name: "warning"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK"
        channel: "#alerts-warning"
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Alert:* {{ .CommonLabels.alertname }}
          *Description:* {{ .CommonAnnotations.description }}
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
